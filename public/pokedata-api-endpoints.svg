<svg xmlns="http://www.w3.org/2000/svg" width="591" height="789" viewBox="0 0 591 789" role="img" aria-labelledby="title desc">
  <title id="title">Endpoints da PokeData API</title>
  <desc id="desc">Lista de endpoints de Pokémon, estatísticas e times na documentação Swagger.</desc>
  <rect width="591" height="789" fill="#ffffff"/>
  <text x="42" y="37" fill="#29344d" font-family="Arial, sans-serif" font-size="25" font-weight="700">Pokémon</text>

  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="33" y="61" width="558" height="39" rx="3" fill="#e9f8f0" stroke="#34d07f"/>
    <rect x="38" y="66" width="80" height="28" rx="3" fill="#45d486"/>
    <text x="59" y="85" fill="#ffffff" font-weight="700">POST</text>
    <text x="128" y="86" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/pokemon</text>
    <text x="241" y="86" fill="#0f172a">Cadastrar Pokémon manualmente</text>

    <rect x="33" y="116" width="558" height="39" rx="3" fill="#edf6ff" stroke="#5aa9ff"/>
    <rect x="38" y="121" width="80" height="28" rx="3" fill="#5aa9ff"/>
    <text x="64" y="140" fill="#ffffff" font-weight="700">GET</text>
    <text x="128" y="141" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/pokemon</text>
    <text x="241" y="141" fill="#0f172a">Listar Pokémon</text>

    <rect x="33" y="171" width="558" height="39" rx="3" fill="#edf6ff" stroke="#5aa9ff"/>
    <rect x="38" y="176" width="80" height="28" rx="3" fill="#5aa9ff"/>
    <text x="64" y="195" fill="#ffffff" font-weight="700">GET</text>
    <text x="128" y="196" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/pokemon/{pokemon_id}</text>
    <text x="322" y="196" fill="#0f172a">Buscar Pokémon por ID</text>

    <rect x="33" y="226" width="558" height="39" rx="3" fill="#e9f8f0" stroke="#34d07f"/>
    <rect x="38" y="231" width="80" height="28" rx="3" fill="#45d486"/>
    <text x="59" y="250" fill="#ffffff" font-weight="700">POST</text>
    <text x="128" y="251" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/pokemon/load/{name}</text>
    <text x="314" y="251" fill="#0f172a">Carregar um Pokémon da PokéAPI</text>

    <rect x="33" y="281" width="558" height="39" rx="3" fill="#e9f8f0" stroke="#34d07f"/>
    <rect x="38" y="286" width="80" height="28" rx="3" fill="#45d486"/>
    <text x="59" y="305" fill="#ffffff" font-weight="700">POST</text>
    <text x="128" y="306" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/pokemon/load-batch</text>
    <text x="314" y="306" fill="#0f172a">Carregar vários Pokémon da PokéAPI</text>
  </g>

  <text x="42" y="368" fill="#29344d" font-family="Arial, sans-serif" font-size="25" font-weight="700">Estatísticas</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="33" y="391" width="558" height="39" rx="3" fill="#edf6ff" stroke="#5aa9ff"/>
    <rect x="38" y="396" width="80" height="28" rx="3" fill="#5aa9ff"/>
    <text x="64" y="415" fill="#ffffff" font-weight="700">GET</text>
    <text x="128" y="416" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/stats/top-attack</text>
    <text x="292" y="416" fill="#0f172a">Top Pokémon por ataque</text>

    <rect x="33" y="446" width="558" height="39" rx="3" fill="#edf6ff" stroke="#5aa9ff"/>
    <rect x="38" y="451" width="80" height="28" rx="3" fill="#5aa9ff"/>
    <text x="64" y="470" fill="#ffffff" font-weight="700">GET</text>
    <text x="128" y="471" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/stats/top-speed</text>
    <text x="282" y="471" fill="#0f172a">Top Pokémon por velocidade</text>

    <rect x="33" y="501" width="558" height="39" rx="3" fill="#edf6ff" stroke="#5aa9ff"/>
    <rect x="38" y="506" width="80" height="28" rx="3" fill="#5aa9ff"/>
    <text x="64" y="525" fill="#ffffff" font-weight="700">GET</text>
    <text x="128" y="526" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/stats/by-type</text>
    <text x="260" y="526" fill="#0f172a">Médias por tipo principal</text>

    <rect x="33" y="556" width="558" height="39" rx="3" fill="#edf6ff" stroke="#5aa9ff"/>
    <rect x="38" y="561" width="80" height="28" rx="3" fill="#5aa9ff"/>
    <text x="64" y="580" fill="#ffffff" font-weight="700">GET</text>
    <text x="128" y="581" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/stats/summary</text>
    <text x="268" y="581" fill="#0f172a">Resumo geral dos stats</text>
  </g>

  <text x="42" y="644" fill="#29344d" font-family="Arial, sans-serif" font-size="25" font-weight="700">Times</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="33" y="666" width="558" height="39" rx="3" fill="#e9f8f0" stroke="#34d07f"/>
    <rect x="38" y="671" width="80" height="28" rx="3" fill="#45d486"/>
    <text x="59" y="690" fill="#ffffff" font-weight="700">POST</text>
    <text x="128" y="691" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/teams/analyze</text>
    <text x="271" y="691" fill="#0f172a">Analisar time</text>

    <rect x="33" y="721" width="558" height="39" rx="3" fill="#e9f8f0" stroke="#34d07f"/>
    <rect x="38" y="726" width="80" height="28" rx="3" fill="#45d486"/>
    <text x="59" y="745" fill="#ffffff" font-weight="700">POST</text>
    <text x="128" y="746" fill="#0f172a" font-family="Consolas, monospace" font-weight="700">/teams/analyze/detailed</text>
    <text x="340" y="746" fill="#0f172a">Analisar time detalhadamente</text>
  </g>
</svg>
