  <defs>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#131722"/>
      <stop offset="100%" stop-color="#0f1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6f7cff"/>
      <stop offset="100%" stop-color="#5865f2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="40" fill="#0b0f16"/>
  <rect x="44" y="44" width="1112" height="632" rx="28" fill="url(#surface)" stroke="#20283a" stroke-width="2"/>

  <rect x="92" y="92" width="1016" height="72" rx="18" fill="#0b0f16" stroke="#20283a" stroke-width="2"/>
  <circle cx="136" cy="128" r="8" fill="#f87171"/>
  <circle cx="164" cy="128" r="8" fill="#fbbf24"/>
  <circle cx="192" cy="128" r="8" fill="#34d399"/>
